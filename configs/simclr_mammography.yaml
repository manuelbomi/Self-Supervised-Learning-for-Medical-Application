# SimCLR pretraining configuration for mammography images
# Optimized for breast cancer screening with conservative augmentations
# that preserve intensity-based diagnostic information.

method: simclr

# Data
data:
  data_dir: data/mammography
  img_size: 224
  in_channels: 1
  label_file: null  # Unlabeled pretraining
  supported_formats: [".dcm", ".png"]
  clip_percentile: [0.5, 99.5]
  num_workers: 8
  pin_memory: true

# Backbone
backbone:
  name: resnet50_medical
  in_channels: 1
  use_se: true
  embed_dim: 2048

# SimCLR-specific
simclr:
  proj_hidden_dim: 2048
  proj_output_dim: 128
  proj_num_layers: 2
  proj_use_bn: true
  temperature: 0.07
  learnable_temperature: false

# Augmentations (conservative for medical images)
augmentations:
  random_rotation_degrees: 15.0
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.0  # Preserve anatomical orientation
  brightness_range: [0.8, 1.2]
  contrast_range: [0.8, 1.2]
  gamma_range: [0.8, 1.2]
  gaussian_noise_std: 0.02
  gaussian_blur_prob: 0.3
  gaussian_blur_sigma: [0.1, 2.0]
  elastic_deformation_prob: 0.2
  elastic_alpha: 50.0
  elastic_sigma: 5.0
  random_erasing_prob: 0.1
  random_erasing_scale: [0.02, 0.1]
  global_crop_scale: [0.4, 1.0]

# Training
training:
  epochs: 200
  batch_size: 512
  optimizer: lars
  base_lr: 0.3
  weight_decay: 1.0e-6
  momentum: 0.9
  warmup_epochs: 10
  min_lr: 0.0
  lr_schedule: cosine
  fp16: true
  gradient_accumulation_steps: 1

# Gradient clipping (not typically needed for SimCLR)
  clip_grad: 0.0

# Checkpointing
checkpoint:
  dir: checkpoints/simclr_mammography
  save_every: 20

# Logging
logging:
  log_every: 50
  wandb_project: medical-ssl
  wandb_entity: null

# Distributed
distributed:
  enabled: false
  backend: nccl
